global:
  scrape_interval: 15s

scrape_configs:
  - job_name: dexos-api
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:5160']

  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
